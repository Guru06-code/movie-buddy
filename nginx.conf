# nginx.conf — reverse proxy for Movie Buddy in production
# Place at: /etc/nginx/sites-available/movie-buddy
# Enable: ln -s /etc/nginx/sites-available/movie-buddy /etc/nginx/sites-enabled/
# Reload: nginx -s reload

upstream movie_buddy {
    server 127.0.0.1:4173;
    keepalive 64;
}

server {
    listen 80;
    server_name moviebuddy.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name moviebuddy.example.com;

    ssl_certificate     /etc/letsencrypt/live/moviebuddy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moviebuddy.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /var/www/movie-buddy;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets served directly by nginx (fast, no Node overhead)
    location ~* \.(js|css|svg|ico|png|woff2|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker must not be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # API proxied to Node
    location /api/ {
        proxy_pass         http://movie_buddy;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 1m;
    }

    # SPA fallback — all non-static, non-API paths serve index.html
    location / {
        try_files $uri /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}
