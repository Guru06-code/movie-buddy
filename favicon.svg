<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#a05010"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#07070d"/>
  <!-- Film strip top holes -->
  <rect x="4"  y="3" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="11" y="3" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="18" y="3" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="25" y="3" width="3" height="3" rx="1" fill="#e8a020"/>
  <!-- Film strip bottom holes -->
  <rect x="4"  y="26" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="11" y="26" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="18" y="26" width="4" height="3" rx="1" fill="#e8a020"/>
  <rect x="25" y="26" width="3" height="3" rx="1" fill="#e8a020"/>
  <!-- Main film strip body -->
  <rect x="2" y="8" width="28" height="16" rx="1" fill="url(#bg)"/>
  <!-- Frame dividers -->
  <rect x="11" y="8" width="1.5" height="16" fill="#07070d" opacity="0.5"/>
  <rect x="20" y="8" width="1.5" height="16" fill="#07070d" opacity="0.5"/>
  <!-- Play triangle in center frame -->
  <polygon points="14,12  14,20  21,16" fill="#07070d"/>
</svg>
