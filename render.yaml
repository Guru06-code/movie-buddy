services:
  - type: web
    name: movie-buddy
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: TMDB_REGION
        value: IN
      - key: REQUEST_BODY_LIMIT_BYTES
        value: "1000000"
      - key: EXTERNAL_FETCH_TIMEOUT_MS
        value: "8000"
      - key: REMINDER_SCHEDULER_INTERVAL_MS
        value: "60000"
      # Set these in the Render dashboard — do NOT put secrets in this file:
      # TURSO_DATABASE_URL
      # TURSO_AUTH_TOKEN
      # TMDB_API_KEY
      # OMDB_API_KEY
      # RESEND_API_KEY
      # FAST2SMS_API_KEY
      # PUSH_VAPID_PUBLIC_KEY
      # PUSH_VAPID_PRIVATE_KEY
      # PUSH_VAPID_SUBJECT
      # ADMIN_EMAIL
      # ADMIN_PHONE
